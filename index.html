function initials(name) {
  return name.split(" ").slice(0, 2).map((w) => w[0]).join("").toUpperCase();
}

function formatDate(iso) {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-");
  return `${d}.${m}.${y}`;
}

function calcAge(dob) {
  const b = new Date(dob), n = new Date();
  let age = n.getFullYear() - b.getFullYear();
  if (n.getMonth() < b.getMonth() || (n.getMonth() === b.getMonth() && n.getDate() < b.getDate())) age--;
  return age;
}

const AVATAR_COLORS = ["#3498DB","#E67E22","#27AE60","#9B59B6","#E74C3C","#16A085","#2980B9","#8E44AD"];
function avatarColor(id) { return AVATAR_COLORS[id % AVATAR_COLORS.length]; }

      </div>
      {breadcrumb && <div style={S.breadcrumb}>{breadcrumb}</div>}

}

function Toast({ message }) {

  return <div style={S.toast}>{message}</div>;
}

      <div style={S.loginWrap}>

          const bChildren = children.filter((c) => bGroups.some((g) => g.id === c.groupId));
          const present = bChildren.filter((c) => attendance[`${c.id}_${date}`] === true).length;
          return (
            <div key={b.id} style={S.card}>
              <div
                style={S.cardPressable}
                onClick={() => onSelect(b)}
                role="button"
                tabIndex={0}
              >
                <div style={S.cardIcon}>📍</div>
                <div style={S.cardText}>
                  <div style={S.cardTitle}>{b.name}</div>
                  <div style={{ fontSize: 12, color: "#1A5C8A", marginTop: 3, fontWeight: 600 }}>
                    Сегодня: {present} из {bChildren.length} присутствуют
                  </div>
                </div>
                <div style={S.cardChevron}>›</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// 4. Экран списка детей с посещаемостью
function ChildListScreen({ group, branch, children, attendance, date, onToggle, onDateChange, onOpenChild, onAdd, onBack }) {
  const kids = children.filter((c) => c.groupId === group.id);
  const present = kids.filter((c) => attendance[`${c.id}_${date}`] === true).length;

  return (
    <div style={S.root}>
      <Header
        title={group.name}
        onBack={onBack}
        breadcrumb={`${branch.name} · Группа ${group.name}`}
      />
      <div style={S.content}>
        {/* Дата */}
        <div style={S.datePicker}>
          <span style={{ fontSize: 16 }}>📅</span>
          <input
            type="date"
            style={S.dateInput}
            value={date}
            onChange={(e) => onDateChange(e.target.value)}
          />
        </div>

        {/* Статистика */}
        <div style={{
          background: "#fff",
          borderRadius: 12,
          padding: "12px 16px",
          marginBottom: 12,
          boxShadow: "0 1px 4px rgba(0,0,0,0.08)",
          display: "flex",
          alignItems: "center",
          gap: 12,
        }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: "#7F8C8D" }}>Присутствуют</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: "#1A5C8A" }}>
              {present} <span style={{ fontSize: 14, color: "#BDC3C7", fontWeight: 400 }}>/ {kids.length}</span>
            </div>
          </div>
          <div style={{ width: 60, height: 60, position: "relative" }}>
            <svg viewBox="0 0 36 36" style={{ transform: "rotate(-90deg)", width: 60, height: 60 }}>
              <circle cx="18" cy="18" r="15.9" fill="none" stroke="#E8F1F8" strokeWidth="3" />
              <circle
                cx="18" cy="18" r="15.9"
                fill="none"
                stroke="#27AE60"
                strokeWidth="3"
                strokeDasharray={`${kids.length ? (present / kids.length) * 100 : 0} 100`}
                strokeLinecap="round"
              />
            </svg>
            <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: "#27AE60" }}>
              {kids.length ? Math.round((present / kids.length) * 100) : 0}%
            </div>
          </div>
        </div>

        {/* Список */}
        <div style={S.sectionTitle}>Дети ({kids.length})</div>
        <div style={S.card}>
          {kids.length === 0 && (
            <div style={S.empty}>Нет детей в группе</div>
          )}
          {kids.map((child, i) => {
            const key = `${child.id}_${date}`;
            const isPresent = attendance[key] === true;
            const isAbsent = attendance[key] === false;
            const isUnmarked = attendance[key] === undefined;

            return (
              <div
                key={child.id}
                style={{
                  ...S.attendRow,
                  borderBottom: i < kids.length - 1 ? "1px solid #F0F4F8" : "none",
                  background: isPresent ? "#F0FBF4" : isAbsent ? "#FEF9F9" : "#fff",
                }}
              >
                {/* Аватар (клик → карточка) */}
                <div
                  style={{ ...S.attendAvatar, background: avatarColor(child.id), color: "#fff", cursor: "pointer" }}
                  onClick={() => onOpenChild(child)}
                  title="Карточка ребёнка"
                >
                  {initials(child.name)}
                </div>

                {/* Имя (клик → карточка) */}
                <div style={{ ...S.attendName, cursor: "pointer" }} onClick={() => onOpenChild(child)}>
                  <div>{child.name.split(" ").slice(0, 2).join(" ")}</div>
                  <div style={{ fontSize: 11, color: "#7F8C8D" }}>{child.name.split(" ")[2] || ""}</div>
                </div>

                {/* Переключатель */}
                <button
                  style={{
                    ...S.attendBadge,
                    background: isPresent ? "#E8F8EF" : isAbsent ? "#FDECEA" : "#F0F4F8",
                    color: isPresent ? "#27AE60" : isAbsent ? "#E74C3C" : "#7F8C8D",
                    border: "none",
                    cursor: "pointer",
                    fontFamily: "inherit",
                  }}
                  onClick={() => onToggle(child.id, date)}
                >
                  {isPresent ? "✓ Был" : isAbsent ? "✗ Нет" : "— ?"}
                </button>
              </div>
            );
          })}
        </div>

        {/* Кнопка добавить */}
        <button
          style={{ ...S.btn, ...S.btnSecondary, marginTop: 8 }}
          onClick={onAdd}
        >
          + Добавить ребёнка
        </button>
      </div>
    </div>
  );
}

// 5. Карточка ребёнка

  const records = Object.entries(attendance)
    .filter(([k]) => k.startsWith(`${child.id}_`))
    .sort(([a], [b]) => b.localeCompare(a))
    .slice(0, 5);

  return (
    <div style={S.root}>
      <Header title="Карточка ребёнка" onBack={onBack} />
      <div style={{ ...S.content, padding: 0 }}>
        <div style={S.childCardHeader}>
          <div style={S.childAvatar}>{initials(child.name)}</div>
          <div style={S.childName}>{child.name}</div>
          <div style={S.childGroup}>{group?.name} · {branch?.name}</div>
        </div>

        <div style={{ padding: "16px 16px 24px" }}>
          <div style={S.formCard}>
            {[
              ["Дата рождения", formatDate(child.dob)],
              ["Возраст", `${calcAge(child.dob)} лет`],
              ["Группа", group?.name || "—"],
              ["Филиал", branch?.name || "—"],
              ["Статус", "Активен"],
            ].map(([label, value]) => (
              <div key={label} style={S.infoRow}>
                <span style={S.infoLabel}>{label}</span>
                <span style={S.infoValue}>{value}</span>
              </div>
            ))}
          </div>

          <div style={S.sectionTitle}>Договор</div>
          <div style={S.formCard}>
            <button
              style={{ ...S.btn, background: "#E8F1F8", color: "#1A5C8A", fontWeight: 600 }}
              onClick={onContractView}
            >
              📄 Просмотреть договор
            </button>
          </div>

          {records.length > 0 && (
            <>
              <div style={S.sectionTitle}>Последние отметки</div>
              <div style={S.formCard}>
                {records.map(([key, val]) => {
                  const dateStr = key.split("_")[1];
                  return (
                    <div key={key} style={{ ...S.infoRow }}>
                      <span style={S.infoLabel}>{formatDate(dateStr)}</span>
                      <span style={{
                        ...S.attendBadge,
                        background: val ? "#E8F8EF" : "#FDECEA",
                        color: val ? "#27AE60" : "#E74C3C",
                        padding: "2px 8px",
                      }}>
                        {val ? "✓ Присутствовал" : "✗ Отсутствовал"}
                      </span>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// 6. Форма добавления ребёнка (модальная)
function AddChildModal({ group, groups, onAdd, onClose }) {
  const [name, setName] = useState("");
  const [dob, setDob] = useState("");
  const [selectedGroup, setSelectedGroup] = useState(group?.id || groups[0]?.id);
  const [fileName, setFileName] = useState("");

  function handleFileChange(e) {
    if (e.target.files[0]) setFileName(e.target.files[0].name);
  }

  function handleSubmit() {
    if (!name.trim() || !dob) return;
    onAdd({ name: name.trim(), dob, groupId: Number(selectedGroup), fileName });
  }

  return (
    <div style={S.overlay} onClick={onClose}>
      <div style={S.modal} onClick={(e) => e.stopPropagation()}>
        <div style={S.modalTitle}>Добавить ребёнка</div>

        <div style={S.formGroup}>
          <span style={S.label}>ФИО ребёнка *</span>
          <input
            style={S.input}
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="Фамилия Имя Отчество"
          />
        </div>

        <div style={S.formGroup}>
          <span style={S.label}>Дата рождения *</span>
          <input
            type="date"
            style={S.input}
            value={dob}
            onChange={(e) => setDob(e.target.value)}
          />
        </div>

        <div style={S.formGroup}>
          <span style={S.label}>Группа</span>
          <select
            style={{ ...S.input, appearance: "none", WebkitAppearance: "none" }}
            value={selectedGroup}
            onChange={(e) => setSelectedGroup(e.target.value)}
          >
            {groups.map((g) => (
              <option key={g.id} value={g.id}>{g.name} (id {g.id})</option>
            ))}
          </select>
        </div>

        <div style={S.formGroup}>
          <span style={S.label}>Договор (PDF)</span>
          <label style={S.fileBtn}>
            <input
              type="file"
              accept=".pdf"
              style={{ display: "none" }}
              onChange={handleFileChange}
            />
            📎 {fileName || "Прикрепить договор"}
          </label>
        </div>

        <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
          <button style={{ ...S.btn, ...S.btnSecondary, flex: 1 }} onClick={onClose}>Отмена</button>
          <button
            style={{ ...S.btn, ...S.btnPrimary, flex: 1, opacity: (!name.trim() || !dob) ? 0.5 : 1 }}
            onClick={handleSubmit}
            disabled={!name.trim() || !dob}
          >
            Добавить
          </button>
        </div>
      </div>
    </div>
  );
}

// 7. Админ — сводный экран

  const total = children.length;
  const totalPresent = children.filter((c) => attendance[`${c.id}_${date}`] === true).length;

  return (
    <div style={S.root}>
      <Header
        title="Обзор"
        right={
          <button
            style={{ ...S.btnSmall, background: "rgba(255,255,255,0.15)", color: "#fff", marginLeft: "auto" }}
            onClick={onLogout}
          >
            Выйти
          </button>
        }
        breadcrumb="Администратор · Все филиалы"
      />
      <div style={S.content}>
        {/* Дата */}
        <div style={S.datePicker}>
          <span>📅</span>
          <input
            type="date"
            style={S.dateInput}
            value={date}
            onChange={(e) => onDateChange(e.target.value)}
          />
        </div>

        {/* Общая сводка */}
        <div style={{
          background: "linear-gradient(135deg, #1A5C8A 0%, #2E7DAF 100%)",
          borderRadius: 14,
          padding: "16px 20px",
          marginBottom: 16,
          color: "#fff",
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
          position: "relative",
          overflow: "hidden",
        }}>
          <span style={{ position: "absolute", top: 10, right: 14, fontSize: 16, opacity: 0.35 }}>✦</span>
          <span style={{ position: "absolute", bottom: 14, right: 60, fontSize: 10, opacity: 0.25 }}>✦</span>
          <div>
            <div style={{ fontSize: 12, opacity: 0.8 }}>Всего присутствуют</div>
            <div style={{ fontSize: 36, fontWeight: 800, lineHeight: 1.1 }}>{totalPresent}</div>
            <div style={{ fontSize: 13, opacity: 0.8 }}>из {total} детей</div>
          </div>
          <div style={{ fontSize: 48, opacity: 0.9 }}>
            {total ? Math.round((totalPresent / total) * 100) : 0}%
          </div>
        </div>

        {/* По филиалам */}
        <div style={S.sectionTitle}>Филиалы</div>
        {branches.map((b) => {
          const bGroups = groups.filter((g) => g.branchId === b.id);
          const bChildren = children.filter((c) => bGroups.some((g) => g.id === c.groupId));
          const bPresent = bChildren.filter((c) => attendance[`${c.id}_${date}`] === true).length;
          const pct = bChildren.length ? Math.round((bPresent / bChildren.length) * 100) : 0;

          return (
            <div
              key={b.id}
              style={{ ...S.summaryCard, cursor: "pointer" }}
              onClick={() => onBranchSelect(b)}
            >
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                <div>
                  <div style={S.summaryBranchName}>{b.name}</div>
                </div>
                <div style={{
                  background: pct >= 70 ? "#E8F8EF" : pct >= 40 ? "#FEF9E7" : "#FDECEA",
                  color: pct >= 70 ? "#27AE60" : pct >= 40 ? "#E67E22" : "#E74C3C",
                  borderRadius: 20, padding: "4px 10px", fontSize: 13, fontWeight: 700,
                }}>
                  {pct}%
                </div>
              </div>

              {/* Прогресс */}
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <div style={S.progressBar}>
                  <div style={{ width: `${pct}%`, height: "100%", background: pct >= 70 ? "#27AE60" : pct >= 40 ? "#E67E22" : "#E74C3C", borderRadius: 2, transition: "width 0.4s" }} />
                </div>
                <span style={{ fontSize: 12, color: "#7F8C8D", flexShrink: 0 }}>{bPresent}/{bChildren.length}</span>
              </div>

              {/* Группы */}
              {bGroups.map((g) => {
                const gKids = children.filter((c) => c.groupId === g.id);
                const gPresent = gKids.filter((c) => attendance[`${c.id}_${date}`] === true).length;
                return (
                  <div key={g.id} style={S.summaryGroup}>
                    <span style={{ fontSize: 13 }}>👶 {g.name}</span>
                    <span style={{ fontSize: 13, fontWeight: 600, color: "#1A5C8A" }}>{gPresent}/{gKids.length}</span>
                  </div>
                );
              })}

              <div style={{ fontSize: 11, color: "#BDC3C7", marginTop: 8, textAlign: "right" }}>
                Нажмите для детального просмотра ›
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── КОРНЕВОЕ ПРИЛОЖЕНИЕ ─────────────────────────────────────────────────────

function App() {
  // Авторизация
  const [role, setRole] = useState(null); // null | "teacher" | "admin"

  // Данные
  const [children, setChildren] = useState(INITIAL_CHILDREN);
  const [attendance, setAttendance] = useState(INITIAL_ATTENDANCE);
  const [date, setDate] = useState(today);

  // Навигация
  const [screen, setScreen] = useState("branches"); // branches | groups | childlist | childcard | adminoverview
  const [selBranch, setSelBranch] = useState(null);
  const [selGroup, setSelGroup] = useState(null);
  const [selChild, setSelChild] = useState(null);

  // UI
  const [showAddModal, setShowAddModal] = useState(false);
  const [toast, setToast] = useState("");
  const [nextId, setNextId] = useState(100);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(""), 2500);
  }

  function handleLogin(r) {
    setRole(r);
    setScreen(r === "admin" ? "adminoverview" : "branches");
  }

  function handleLogout() {
    setRole(null);
    setScreen("branches");
    setSelBranch(null);
    setSelGroup(null);
    setSelChild(null);
  }

  function toggleAttendance(childId, d) {
    const key = `${childId}_${d}`;
    setAttendance((prev) => {
      const cur = prev[key];
      // undefined → true → false → undefined
      const next = cur === undefined ? true : cur === true ? false : undefined;
      const copy = { ...prev };
      if (next === undefined) delete copy[key];
      else copy[key] = next;
      return copy;
    });
  }

  function handleAddChild({ name, dob, groupId }) {
    const newChild = { id: nextId, name, dob, groupId };
    setChildren((prev) => [...prev, newChild]);
    setNextId((n) => n + 1);
    setShowAddModal(false);
    showToast(`${name.split(" ")[0]} добавлен в список`);
  }

  // Найти группу/филиал для карточки
  const childGroup = useMemo(() => selChild ? GROUPS.find((g) => g.id === selChild.groupId) || groups.find((g) => g.id === selChild.groupId) : null, [selChild, children]);
  const childBranch = useMemo(() => childGroup ? BRANCHES.find((b) => b.id === childGroup.branchId) : null, [childGroup]);

  // groups с учётом добавленных детей (только для правильного отображения)
  const groups = GROUPS;

  if (!role) return <LoginScreen onLogin={handleLogin} />;

  return (
    <div style={{ maxWidth: 430, margin: "0 auto", minHeight: "100vh", background: "#F0F4F8" }}>
      {/* ── ЭКРАНЫ ── */}
      {screen === "adminoverview" && role === "admin" && (
        <AdminOverviewScreen
          branches={BRANCHES}
          groups={groups}
          children={children}
          attendance={attendance}
          date={date}
          onDateChange={setDate}
          onBranchSelect={(b) => { setSelBranch(b); setScreen("groups"); }}
          onLogout={handleLogout}
        />
      )}

      {screen === "branches" && (
        <BranchListScreen
          branches={BRANCHES}
          groups={groups}
          children={children}
          attendance={attendance}
          date={date}
          role={role}
          onSelect={(b) => { setSelBranch(b); setScreen("groups"); }}
          onLogout={handleLogout}
        />
      )}

      {screen === "groups" && selBranch && (
        <GroupListScreen
          branch={selBranch}
          groups={groups.filter((g) => g.branchId === selBranch.id)}
          children={children}
          attendance={attendance}
          date={date}
          onSelect={(g) => { setSelGroup(g); setScreen("childlist"); }}
          onBack={() => {
            if (role === "admin") setScreen("adminoverview");
            else setScreen("branches");
          }}
        />
      )}

      {screen === "childlist" && selGroup && selBranch && (
        <ChildListScreen
          group={selGroup}
          branch={selBranch}
          children={children}
          attendance={attendance}
          date={date}
          onToggle={toggleAttendance}
          onDateChange={setDate}
          onOpenChild={(c) => { setSelChild(c); setScreen("childcard"); }}
          onAdd={() => setShowAddModal(true)}
          onBack={() => setScreen("groups")}
        />
      )}

      {screen === "childcard" && selChild && (
        <ChildCardScreen
          child={selChild}
          group={groups.find((g) => g.id === selChild.groupId)}
          branch={BRANCHES.find((b) => {
            const g = groups.find((gg) => gg.id === selChild.groupId);
            return g && b.id === g.branchId;
          })}
          attendance={attendance}
          onBack={() => setScreen("childlist")}
          onContractView={() => showToast("📄 Договор: открытие файла (заглушка)")}
        />
      )}

      {/* ── МОДАЛ ДОБАВЛЕНИЯ ── */}
      {showAddModal && (
        <AddChildModal
          group={selGroup}
          groups={groups}
          onAdd={handleAddChild}
          onClose={() => setShowAddModal(false)}
        />
      )}

      {/* ── ТОСТ ── */}
      <Toast message={toast} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
